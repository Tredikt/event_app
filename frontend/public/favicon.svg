  <rect x="11" y="7.5" width="2.5" height="5" rx="1.25" fill="white"/>
  <rect x="18.5" y="7.5" width="2.5" height="5" rx="1.25" fill="white"/>
  <!-- Grid dots -->
  <rect x="9" y="20" width="3" height="2.5" rx="0.75" fill="#1d4ed8"/>
  <rect x="14.5" y="20" width="3" height="2.5" rx="0.75" fill="#1d4ed8"/>
  <rect x="20" y="20" width="3" height="2.5" rx="0.75" fill="#1d4ed8"/>
